<!DOCTYPE html>
<html>
<head>

<title>Login - Online Voting System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{

height:100vh;

background: linear-gradient(135deg,#2c3e50,#4ca1af);

display:flex;

justify-content:center;

align-items:center;

}

.login-box{

background:white;

padding:40px;

width:380px;

border-radius:10px;

box-shadow:0 10px 25px rgba(0,0,0,0.3);

}

.login-box h2{

text-align:center;

margin-bottom:25px;

color:#2c3e50;

}

.input-box{

margin-bottom:20px;

}

.input-box input{

width:100%;

padding:12px;

border:1px solid #ccc;

border-radius:5px;

font-size:15px;

}

.input-box input:focus{

border-color:#4ca1af;

outline:none;

}

button{

width:100%;

padding:12px;

background:#2c3e50;

border:none;

color:white;

font-size:16px;

border-radius:5px;

cursor:pointer;

transition:0.3s;

}

button:hover{

background:#1a252f;

}

.error{

margin-top:10px;

color:red;

text-align:center;

}

.title{

position:absolute;

top:40px;

color:white;

font-size:28px;

font-weight:bold;

}

</style>

</head>

<body>

<div class="title">Online Voting System</div>

<div class="login-box">

<h2>Login</h2>

<form method="POST">

<div class="input-box">

<input type="text" name="username" placeholder="Username" required>

</div>

<div class="input-box">

<input type="password" name="password" placeholder="Password" required>

</div>

<button type="submit">Login</button>

</form>

<!-- <p class="error">{{ error }}</p> -->

</div>

</body>
</html>
