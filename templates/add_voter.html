{% extends "base.html" %}

{% block content %}

<div style="display:flex;justify-content:center;margin-top:60px;">

<div style="
width:420px;
background:white;
padding:35px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
">

<h2 style="text-align:center;margin-bottom:25px;color:#2c3e50;">
Add New Voter
</h2>

<form method="POST">

<div style="margin-bottom:20px;">

<label style="font-weight:bold;">Username</label>

<input
type="text"
name="username"
placeholder="Enter Username"
required
style="
width:100%;
padding:10px;
margin-top:6px;
border:1px solid #ccc;
border-radius:5px;
font-size:14px;
"

>

</div>

<div style="margin-bottom:20px;">

<label style="font-weight:bold;">Password</label>

<input
type="password"
name="password"
placeholder="Enter Password"
required
style="
width:100%;
padding:10px;
margin-top:6px;
border:1px solid #ccc;
border-radius:5px;
font-size:14px;
"

>

</div>

<button
type="submit"
style="
width:100%;
padding:12px;
background:#2c3e50;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.3s;
"
onmouseover="this.style.background='#1a252f'"
onmouseout="this.style.background='#2c3e50'"

>

Add Voter

</button>

</form>

{% if message %}

<p style="
margin-top:15px;
text-align:center;
color:green;
font-weight:bold;
">
{{ message }}
</p>

{% endif %}

</div>

</div>

{% endblock %}
